name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Build and deploy the GCP scanner image"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'poly-x-kalshi' }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,gcp,dashboard]"
      - name: Run tests
        run: python -m pytest -q

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform -chdir=infra/gcp fmt -check
      - name: Terraform validate
        run: |
          terraform -chdir=infra/gcp init -backend=false
          terraform -chdir=infra/gcp validate

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build scanner image locally
        run: docker build -f docker/Dockerfile.gcp-scanner -t poly-x-kalshi-scanner:ci .

  deploy:
    needs: [test, terraform, docker-build]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
      - name: Deploy scanner and daily pipeline
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: ./scripts/deploy_gcp_scanner.sh
